<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Schema diagram</title>
<style>
  :root { --fg:#272727; --muted:#666; --line:#eaeaea; --bg:#fff; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  #bar { position:fixed; top:8px; right:8px; z-index:10; display:flex; gap:6px;
    align-items:center; background:rgba(255,255,255,.9); border:1px solid var(--line);
    border-radius:8px; padding:4px 8px; }
  #bar button { border:1px solid var(--line); background:#fafafa; border-radius:6px;
    width:28px; height:28px; font-size:15px; cursor:pointer; }
  #bar button:hover { background:#f0f0f0; }
  #stamp { position:fixed; bottom:8px; left:10px; color:var(--muted); font-size:12px; }
  #scroll { position:absolute; inset:0; overflow:auto; cursor:grab; }
  #scroll.grabbing { cursor:grabbing; }
  #stage { transform-origin: 0 0; padding:24px; width:max-content; }
  #stage svg { max-width:none !important; height:auto; }
  #err { padding:24px; color:#a71000; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="bar">
  <button id="out" title="Zoom out">−</button>
  <button id="reset" title="Reset">⤢</button>
  <button id="in" title="Zoom in">+</button>
</div>
<div id="scroll"><div id="stage"><div id="err">Loading…</div></div></div>
<div id="stamp"></div>

<script src="mermaid.min.js"></script>
<script>
(async () => {
  const stage = document.getElementById('stage');
  const scroll = document.getElementById('scroll');
  const err = document.getElementById('err');
  try {
    const text = await (await fetch('schema.mmd', { cache: 'no-store' })).text();
    const m = text.match(/generated\s+(\d{4}-\d{2}-\d{2})/);
    if (m) document.getElementById('stamp').textContent = 'Schema as of ' + m[1];
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    const { svg } = await mermaid.render('erd', text);
    stage.innerHTML = svg;
  } catch (e) {
    err.textContent = 'Could not render diagram:\n' + (e && e.message ? e.message : e);
    return;
  }

  // Zoom (buttons + ctrl/⌘-wheel) and drag-to-pan.
  let scale = 1;
  const apply = () => { stage.style.transform = 'scale(' + scale + ')'; };
  const zoom = (f) => { scale = Math.min(4, Math.max(0.2, scale * f)); apply(); };
  document.getElementById('in').onclick = () => zoom(1.2);
  document.getElementById('out').onclick = () => zoom(1 / 1.2);
  document.getElementById('reset').onclick = () => { scale = 1; apply(); };
  scroll.addEventListener('wheel', (e) => {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault(); zoom(e.deltaY < 0 ? 1.1 : 1 / 1.1);
  }, { passive: false });

  let panning = false, sx = 0, sy = 0, l0 = 0, t0 = 0;
  scroll.addEventListener('pointerdown', (e) => {
    panning = true; sx = e.clientX; sy = e.clientY;
    l0 = scroll.scrollLeft; t0 = scroll.scrollTop;
    scroll.classList.add('grabbing'); scroll.setPointerCapture(e.pointerId);
  });
  scroll.addEventListener('pointermove', (e) => {
    if (!panning) return;
    scroll.scrollLeft = l0 - (e.clientX - sx);
    scroll.scrollTop = t0 - (e.clientY - sy);
  });
  const end = () => { panning = false; scroll.classList.remove('grabbing'); };
  scroll.addEventListener('pointerup', end);
  scroll.addEventListener('pointercancel', end);
})();
</script>
</body>
</html>
